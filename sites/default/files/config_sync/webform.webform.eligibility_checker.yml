id: eligibility_checker
title: 'Eligibility checker'
description: ''
categories: {  }
elements: |-
  eligibility_checkboxes:
    '#type': webform_likert
    '#title': 'Eligibility checker'
    '#required': true
    '#required_error': 'Please answer all of the questions.'
    '#questions':
      'Do you meet the definition of primary producer as outlined in the Guidelines?': 'Do you meet the definition of primary producer as outlined in the Guidelines?'
      'Do you hold an Australian Business Number (ABN) and have held that ABN at the time of the eligible disaster?': 'Do you hold an Australian Business Number (ABN) and have held that ABN at the time of the eligible disaster?'
      'Do you have a primary production enterprise that is located in the defined area for the eligible disaster that has suffered dire': 'Do you have a primary production enterprise that is located in the defined area for the eligible disaster that has suffered direct damage as a result of the eligible disaster?'
      'Have you been engaged in carrying on the primary production enterprise when affected by the eligible disaster?': 'Have you been engaged in carrying on the primary production enterprise when affected by the eligible disaster?'
      'Are you primarily responsible for meeting the costs you wish to claim in the application?': 'Are you primarily responsible for meeting the costs you wish to claim in the application?'
      'Do you have evidence of damage (e.g. photos, videos etc)?': 'Do you have evidence of damage (e.g. photos, videos etc)?'
      'Do you intend to re-establish your primary production enterprise in the defined disaster area for the eligible disaster?': 'Do you intend to re-establish your primary production enterprise in the defined disaster area for the eligible disaster?'
      'Did you sustain direct physical damage to your business or property as a result of the event? ': 'Did you sustain direct physical damage to your business or property as a result of the event? '
    '#answers':
      'Yes': 'Yes'
      'No': 'No'
  success_msg:
    '#type': webform_message
    '#states':
      visible:
        ':input[name="eligibility_checkboxes[Do you meet the definition of primary producer as outlined in the Guidelines?]"]':
          value: 'Yes'
        ':input[name="eligibility_checkboxes[Do you hold an Australian Business Number (ABN) and have held that ABN at the time of the eligible disaster?]"]':
          value: 'Yes'
        ':input[name="eligibility_checkboxes[Do you have a primary production enterprise that is located in the defined area for the eligible disaster that has suffered dire]"]':
          value: 'Yes'
        ':input[name="eligibility_checkboxes[Have you been engaged in carrying on the primary production enterprise when affected by the eligible disaster?]"]':
          value: 'Yes'
        ':input[name="eligibility_checkboxes[Are you primarily responsible for meeting the costs you wish to claim in the application?]"]':
          value: 'Yes'
        ':input[name="eligibility_checkboxes[Do you have evidence of damage (e.g. photos, videos etc)?]"]':
          value: 'Yes'
        ':input[name="eligibility_checkboxes[Do you intend to re-establish your primary production enterprise in the defined disaster area for the eligible disaster?]"]':
          value: 'Yes'
        ':input[name="eligibility_checkboxes[Did you sustain direct physical damage to your business or property as a result of the event? ]"]':
          value: 'Yes'
    '#message_message': '<p>You may be eligible for a Disaster Assistance Recovery Grant. Click on the Apply Now button to complete an application on QRIDA’s online portal or download a PDF application. For assistance, please contact your local Regional Area Manager on 1800 623 946.</p>'
  warning_msg:
    '#type': webform_message
    '#states':
      visible:
        - ':input[name="eligibility_checkboxes[Do you meet the definition of primary producer as outlined in the Guidelines?]"]':
            value: 'No'
        - or
        - ':input[name="eligibility_checkboxes[Do you hold an Australian Business Number (ABN) and have held that ABN at the time of the eligible disaster?]"]':
            value: 'No'
        - or
        - ':input[name="eligibility_checkboxes[Do you have a primary production enterprise that is located in the defined area for the eligible disaster that has suffered dire]"]':
            value: 'No'
        - or
        - ':input[name="eligibility_checkboxes[Have you been engaged in carrying on the primary production enterprise when affected by the eligible disaster?]"]':
            value: 'No'
        - or
        - ':input[name="eligibility_checkboxes[Are you primarily responsible for meeting the costs you wish to claim in the application?]"]':
            value: 'No'
        - or
        - ':input[name="eligibility_checkboxes[Do you have evidence of damage (e.g. photos, videos etc)?]"]':
            value: 'No'
        - or
        - ':input[name="eligibility_checkboxes[Do you intend to re-establish your primary production enterprise in the defined disaster area for the eligible disaster?]"]':
            value: 'No'
        - or
        - ':input[name="eligibility_checkboxes[Did you sustain direct physical damage to your business or property as a result of the event? ]"]':
            value: 'No'
    '#message_type': warning
    '#message_message': '<p>You may not be eligible for this assistance. Please contact QRIDA on 1800 623 946 to discuss your individual circumstance.</p>'
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit_hide': true
    '#update_hide': true
