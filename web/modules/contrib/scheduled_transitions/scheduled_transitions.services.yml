services:
  _defaults:
    autoconfigure: true
    autowire: true

  scheduled_transitions.utility:
    class: 'Drupal\scheduled_transitions\ScheduledTransitionsUtility'
    arguments:
      $cache: '@cache.default'
  Drupal\scheduled_transitions\ScheduledTransitionsUtilityInterface: '@scheduled_transitions.utility'

  scheduled_transitions.runner:
    class: 'Drupal\scheduled_transitions\ScheduledTransitionsRunner'
  Drupal\scheduled_transitions\ScheduledTransitionsRunnerInterface: '@scheduled_transitions.runner'

  scheduled_transitions.jobs:
    class: 'Drupal\scheduled_transitions\ScheduledTransitionsJobs'
  Drupal\scheduled_transitions\ScheduledTransitionsJobsInterface: '@scheduled_transitions.jobs'

  logger.channel.scheduled_transitions:
    parent: logger.channel_base
    arguments:
      $channel: 'scheduled_transitions'

  Drupal\scheduled_transitions\Access\SupportsContentModerationAccessCheck:
    tags:
      - { name: access_check, applies_to: _scheduled_transitions_supports_content_moderation }

  Drupal\scheduled_transitions\EventSubscriber\ScheduledTransitionsNewRevision: ~

  scheduled_transitions.config:
    class: Drupal\scheduled_transitions\ScheduledTransitionsConfig
  Drupal\scheduled_transitions\ScheduledTransitionsConfigInterface: '@scheduled_transitions.config'

  Drupal\scheduled_transitions\ScheduledTransitionsHooks: ~
  Drupal\scheduled_transitions\ScheduledTransitionsEntityHooks: ~
